<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Hibiki - 卒業多重録音</title>
    <style>
      :root {
        --primary-color: #ff6b6b;
        --bg-color: #fdf6f0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .container {
        background: white;
        padding: 2rem 1.5rem;
        border-radius: 30px;
        box-shadow: 0 15px 35px rgba(216, 138, 138, 0.15);
        text-align: center;
        width: 100%;
        max-width: 400px; /* スマホで横幅いっぱいに、PCでは適切な幅に */
        box-sizing: border-box;
      }
      h1 {
        color: #d88a8a;
        font-size: 1.8rem;
        margin: 0 0 10px 0;
      }
      .status {
        margin-bottom: 25px;
        font-size: 0.9rem;
        color: #d88a8a;
        font-weight: bold;
        height: 1.2em;
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* ボタンを大きくして押しやすく */
      button {
        padding: 16px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition:
          transform 0.1s,
          background 0.3s;
        -webkit-tap-highlight-color: transparent; /* タップ時の青枠を消す */
      }
      button:active {
        transform: scale(0.98);
      }

      #recBtn {
        background: var(--primary-color);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
      }
      #recBtn.recording {
        background: #333;
        animation: pulse 1.5s infinite;
      }
      #playBtn {
        background: #4ecdc4;
        color: white;
      }
      #dlBtn {
        background: #ffd700;
        color: #333;
      }
      #resetBtn {
        background: transparent;
        color: #999;
        font-size: 0.8rem;
        text-decoration: underline;
        margin-top: 10px;
      }

      button:disabled {
        background: #eee !important;
        color: #bbb !important;
        box-shadow: none !important;
      }

      audio {
        width: 100%;
        margin-top: 25px;
        border-radius: 10px;
      }

      .hint {
        font-size: 11px;
        color: #bba;
        margin-top: 20px;
        line-height: 1.5;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hibiki 🌸</h1>
      <div class="status" id="statusMsg">イヤホンを推奨します</div>

      <div class="controls">
        <button id="recBtn">声を吹き込む</button>
        <button id="playBtn" disabled>今の音を聴く</button>
        <button id="dlBtn" disabled>WAVとして保存</button>
        <button id="resetBtn">最初からやり直す</button>
      </div>

      <audio id="mainAudio" controls playsinline></audio>

      <div class="hint">
        ※ 録音するたびに、前の音に重なります。<br />
        友達に回して、声を重ねていきましょう。
      </div>
    </div>

    <script>
      let audioContext;
      let currentBlob = null;
      let mediaRecorder;
      let chunks = [];

      const recBtn = document.getElementById("recBtn");
      const playBtn = document.getElementById("playBtn");
      const dlBtn = document.getElementById("dlBtn");
      const resetBtn = document.getElementById("resetBtn");
      const mainAudio = document.getElementById("mainAudio");
      const statusMsg = document.getElementById("statusMsg");

      // WAV変換ロジック（そのまま）
      function bufferToWave(abuffer, len) {
        let numOfChan = abuffer.numberOfChannels,
          length = len * numOfChan * 2 + 44,
          buffer = new ArrayBuffer(length),
          view = new DataView(buffer),
          channels = [],
          i,
          sample,
          offset = 0,
          pos = 0;
        const setUint16 = (data) => {
          view.setUint16(pos, data, true);
          pos += 2;
        };
        const setUint32 = (data) => {
          view.setUint32(pos, data, true);
          pos += 4;
        };
        setUint32(0x46464952);
        setUint32(length - 8);
        setUint32(0x45564157);
        setUint32(0x20746d66);
        setUint32(16);
        setUint16(1);
        setUint16(numOfChan);
        setUint32(abuffer.sampleRate);
        setUint32(abuffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2);
        setUint16(16);
        setUint32(0x61746164);
        setUint32(length - pos - 4);
        for (i = 0; i < numOfChan; i++)
          channels.push(abuffer.getChannelData(i));
        while (pos < length) {
          for (i = 0; i < numOfChan; i++) {
            sample = Math.max(-1, Math.min(1, channels[i][offset]));
            sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
            view.setInt16(pos, sample, true);
            pos += 2;
          }
          offset++;
        }
        return new Blob([buffer], { type: "audio/wav" });
      }

      recBtn.onclick = async () => {
        try {
          if (!audioContext) {
            audioContext = new (
              window.AudioContext || window.webkitAudioContext
            )();
          }
          if (audioContext.state === "suspended") await audioContext.resume();

          if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            return;
          }

          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          const micSource = audioContext.createMediaStreamSource(stream);
          const dest = audioContext.createMediaStreamDestination();
          micSource.connect(dest);

          if (currentBlob) {
            const ab = await currentBlob.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(ab);
            const player = audioContext.createBufferSource();
            player.buffer = audioBuffer;
            player.connect(dest);
            player.connect(audioContext.destination);
            player.start();
          }

          mediaRecorder = new MediaRecorder(dest.stream);
          chunks = [];
          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);

          mediaRecorder.onstop = async () => {
            statusMsg.innerText = "思い出を合成中...";
            recBtn.classList.remove("recording");
            recBtn.innerText = "さらに声を重ねる";

            const rawBlob = new Blob(chunks);
            const ab = await rawBlob.arrayBuffer();
            audioContext.decodeAudioData(
              ab,
              (decoded) => {
                const wavBlob = bufferToWave(decoded, decoded.length);
                currentBlob = wavBlob;
                mainAudio.src = URL.createObjectURL(wavBlob);
                playBtn.disabled = false;
                dlBtn.disabled = false;
                statusMsg.innerText = "重なりました！";
              },
              (err) => {
                statusMsg.innerText = "録音エラー：もう一度お試しください";
              },
            );
          };

          mediaRecorder.start();
          recBtn.classList.add("recording");
          recBtn.innerText = "録音を完了する";
          statusMsg.innerText = "録音中...";
        } catch (err) {
          statusMsg.innerText = "マイクを許可してください";
        }
      };

      playBtn.onclick = () => mainAudio.play();
      dlBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = mainAudio.src;
        a.download = `hibiki_${Date.now()}.wav`;
        a.click();
      };
      resetBtn.onclick = () => {
        if (confirm("全ての録音を消去して最初からやり直しますか？")) {
          location.reload();
        }
      };
    </script>
  </body>
</html>
