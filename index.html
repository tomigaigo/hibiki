<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Hibiki - 卒業多重録音</title>
    <style>
      :root {
        --primary-color: #ff6b6b;
        --bg-color: #fdf6f0;
      }
      body {
        font-family: sans-serif;
        background: var(--bg-color);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
      }
      .container {
        background: white;
        padding: 2rem 1.5rem;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
      }
      h1 {
        color: #d88a8a;
        font-size: 1.8rem;
        margin: 0 0 10px 0;
      }
      .status {
        margin-bottom: 20px;
        font-size: 0.9rem;
        color: #d88a8a;
        font-weight: bold;
        height: 1.2em;
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      button {
        padding: 16px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: 0.2s;
      }
      #recBtn {
        background: var(--primary-color);
        color: white;
      }
      #recBtn.recording {
        background: #333;
        animation: pulse 1.5s infinite;
      }
      #playBtn {
        background: #4ecdc4;
        color: white;
      }
      #dlBtn {
        background: #ffd700;
        color: #333;
      }
      #resetBtn {
        background: #eee;
        color: #666;
        font-size: 0.8rem;
        margin-top: 5px;
      }
      button:disabled {
        background: #eee !important;
        color: #bbb !important;
      }
      audio {
        width: 100%;
        margin-top: 20px;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hibiki 🌸</h1>
      <div class="status" id="statusMsg">マイクを許可して開始</div>
      <div class="controls">
        <button id="recBtn">録音開始</button>
        <button id="playBtn" disabled>再生</button>
        <button id="dlBtn" disabled>WAV保存</button>
        <button id="resetBtn">リセット</button>
      </div>
      <audio id="mainAudio" controls playsinline></audio>
    </div>

    <script>
      let audioContext,
        currentBlob,
        mediaRecorder,
        chunks = [];
      const recBtn = document.getElementById("recBtn"),
        playBtn = document.getElementById("playBtn"),
        dlBtn = document.getElementById("dlBtn"),
        resetBtn = document.getElementById("resetBtn"),
        mainAudio = document.getElementById("mainAudio"),
        statusMsg = document.getElementById("statusMsg");

      function bufferToWave(abuffer, len) {
        let numOfChan = abuffer.numberOfChannels,
          length = len * numOfChan * 2 + 44,
          buffer = new ArrayBuffer(length),
          view = new DataView(buffer),
          pos = 0;
        const set = (d, t) => {
          if (t === 16) view.setUint16(pos, d, true);
          else view.setUint32(pos, d, true);
          pos += t === 16 ? 2 : 4;
        };
        set(0x46464952, 32);
        set(length - 8, 32);
        set(0x45564157, 32);
        set(0x20746d66, 32);
        set(16, 32);
        set(1, 16);
        set(numOfChan, 16);
        set(abuffer.sampleRate, 32);
        set(abuffer.sampleRate * 2 * numOfChan, 32);
        set(numOfChan * 2, 16);
        set(16, 16);
        set(0x61746164, 32);
        set(length - pos - 4, 32);
        for (let i = 0; i < numOfChan; i++) {
          let chan = abuffer.getChannelData(i);
          for (let j = 0; j < len; j++) {
            let s = Math.max(-1, Math.min(1, chan[j]));
            s = (0.5 + s < 0 ? s * 32768 : s * 32767) | 0;
            view.setInt16(pos, s, true);
            pos += 2;
          }
        }
        return new Blob([buffer], { type: "audio/wav" });
      }

      recBtn.onclick = async () => {
        if (!audioContext)
          audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
        if (audioContext.state === "suspended") await audioContext.resume();
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: true,
        });
        const dest = audioContext.createMediaStreamDestination();
        audioContext.createMediaStreamSource(stream).connect(dest);
        if (currentBlob) {
          const ab = await audioContext.decodeAudioData(
            await currentBlob.arrayBuffer(),
          );
          const player = audioContext.createBufferSource();
          player.buffer = ab;
          player.connect(dest);
          player.connect(audioContext.destination);
          player.start();
        }
        mediaRecorder = new MediaRecorder(dest.stream);
        chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          statusMsg.innerText = "変換中...";
          const ab = await new Blob(chunks).arrayBuffer();
          audioContext.decodeAudioData(ab, (decoded) => {
            currentBlob = bufferToWave(decoded, decoded.length);
            mainAudio.src = URL.createObjectURL(currentBlob);
            playBtn.disabled = dlBtn.disabled = false;
            statusMsg.innerText = "完了！";
            recBtn.classList.remove("recording");
            recBtn.innerText = "録音開始";
          });
        };
        mediaRecorder.start();
        recBtn.classList.add("recording");
        recBtn.innerText = "録音を停止";
        statusMsg.innerText = "録音中...";
      };

      playBtn.onclick = () => mainAudio.play();
      dlBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = mainAudio.src;
        a.download = `hibiki_${Date.now()}.wav`;
        a.click();
      };
      resetBtn.onclick = () => location.reload();
    </script>
  </body>
</html>
